<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>M'WASH3 PRO · THP Group</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
:root{
  --bg:#0f1117;--surface:#1a1d26;--surface2:#222533;--surface3:#2a2e40;
  --border:#2e3347;--border2:#3d4260;
  --blue:#3b82f6;--blue2:#2563eb;--blue-glow:rgba(59,130,246,.18);
  --yellow:#f59e0b;--yellow2:#d97706;--yellow-glow:rgba(245,158,11,.18);
  --red:#ef4444;--red2:#dc2626;--red-glow:rgba(239,68,68,.18);
  --green:#22c55e;--green2:#16a34a;--green-glow:rgba(34,197,94,.18);
  --orange:#f97316;--purple:#a855f7;
  --text:#e8eaf6;--text2:#94a3b8;--text3:#64748b;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --font:'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* ── LOGIN ── */
#screen-login{
  background:linear-gradient(135deg,#0a0d16 0%,#111827 50%,#0f1117 100%);
  align-items:center;justify-content:center;padding:24px;
}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .brand{font-size:11px;letter-spacing:4px;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.login-logo .title{font-size:28px;font-weight:700;color:var(--text);letter-spacing:-0.5px}
.login-logo .title span{color:var(--blue)}
.login-logo .sub{font-size:12px;color:var(--text3);margin-top:4px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:380px;box-shadow:var(--shadow)}
.login-card label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;margin-top:16px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.login-card label:first-child{margin-top:0}
select,input,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-xs);color:var(--text);padding:11px 14px;font-size:15px;font-family:var(--font);outline:none;transition:border-color .2s}
select:focus,input:focus,textarea:focus{border-color:var(--blue)}
.mode-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:6px}
.mode-btn{background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px 6px;text-align:center;cursor:pointer;transition:all .2s;user-select:none}
.mode-btn .mode-ico{font-size:22px;display:block;margin-bottom:4px}
.mode-btn .mode-lbl{font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.5px}
.mode-btn.selected-blue{border-color:var(--blue);background:var(--blue-glow)}
.mode-btn.selected-yellow{border-color:var(--yellow);background:var(--yellow-glow)}
.mode-btn.selected-red{border-color:var(--red);background:var(--red-glow)}
.btn-enter{width:100%;margin-top:20px;padding:14px;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.btn-enter.blue{background:var(--blue);color:#fff}
.btn-enter.yellow{background:var(--yellow);color:#000}
.btn-enter.red{background:var(--red);color:#fff}
.btn-enter:hover{opacity:.9;transform:translateY(-1px)}
.version-tag{text-align:center;font-size:11px;color:var(--text3);margin-top:16px}

/* ── HEADER ── */
.app-header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:12px 16px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;
}
.app-header .back-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-xs);width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:16px;color:var(--text2);transition:all .2s}
.app-header .back-btn:hover{background:var(--surface3);color:var(--text)}
.header-info{flex:1;min-width:0}
.header-title{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-sub{font-size:11px;color:var(--text3);margin-top:1px}
.header-badge{flex-shrink:0;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px}
.badge-blue{background:var(--blue-glow);color:var(--blue);border:1px solid var(--blue)}
.badge-yellow{background:var(--yellow-glow);color:var(--yellow);border:1px solid var(--yellow)}
.badge-red{background:var(--red-glow);color:var(--red);border:1px solid var(--red)}
.badge-green{background:var(--green-glow);color:var(--green);border:1px solid var(--green)}

/* ── TABS ── */
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-item{flex-shrink:0;padding:10px 16px;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;letter-spacing:.3px}
.tab-item.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-content{display:none;flex:1;overflow-y:auto;padding:16px}
.tab-content.active{display:block}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title .ico{font-size:16px}

/* ── FORM ELEMENTS ── */
.field-row{margin-bottom:12px}
.field-label{font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:500;letter-spacing:.4px;text-transform:uppercase}
.field-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
textarea{resize:vertical;min-height:72px}

/* ── CHECKLIST ITEMS ── */
.chk-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;transition:border-color .2s}
.chk-item.bad{border-color:var(--red);background:var(--red-glow)}
.chk-item.good{border-color:var(--green)}
.chk-row{display:flex;align-items:center;gap:10px}
.chk-label{flex:1;font-size:14px;color:var(--text)}
.chk-label small{display:block;font-size:11px;color:var(--text3);margin-top:2px}
.chk-btns{display:flex;gap:5px;flex-shrink:0}
.chk-btn{width:34px;height:34px;border:1px solid var(--border);border-radius:var(--radius-xs);background:var(--surface3);color:var(--text2);font-size:14px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-weight:700}
.chk-btn:hover{border-color:var(--blue);color:var(--blue)}
.chk-btn.sel-ok{background:var(--green2);border-color:var(--green);color:#fff}
.chk-btn.sel-bad{background:var(--red2);border-color:var(--red);color:#fff}
.chk-btn.sel-na{background:var(--surface3);border-color:var(--border2);color:var(--text3)}
.chk-note{margin-top:8px}
.chk-section{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin:16px 0 8px;padding-left:4px;border-left:3px solid var(--border2);padding-left:10px}

/* ── STATUS BADGES ── */
.status-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.status-chip{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .2s}
.status-chip.sel-ok{background:var(--green-glow);border-color:var(--green);color:var(--green)}
.status-chip.sel-warn{background:var(--yellow-glow);border-color:var(--yellow);color:var(--yellow)}
.status-chip.sel-bad{background:var(--red-glow);border-color:var(--red);color:var(--red)}
.status-chip.sel-changed{background:rgba(168,85,247,.15);border-color:var(--purple);color:var(--purple)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;background:var(--surface2);color:var(--text);font-family:var(--font)}
.btn:hover{background:var(--surface3);border-color:var(--border2)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue2)}
.btn-success{background:var(--green2);border-color:var(--green);color:#fff}
.btn-danger{background:var(--red2);border-color:var(--red);color:#fff}
.btn-yellow{background:var(--yellow2);border-color:var(--yellow);color:#000}
.btn-full{width:100%;justify-content:center;padding:13px}
.btn-sm{padding:7px 12px;font-size:12px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}

/* ── PHOTO GRID ── */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.photo-thumb{aspect-ratio:1;border-radius:var(--radius-xs);overflow:hidden;background:var(--surface2);border:1px solid var(--border);position:relative;cursor:pointer}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb .del-btn{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(0,0,0,.7);border:none;border-radius:50%;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-add{aspect-ratio:1;border-radius:var(--radius-xs);background:var(--surface2);border:2px dashed var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:var(--text3);font-size:11px;gap:4px}
.photo-add:hover{border-color:var(--blue);color:var(--blue)}
.photo-add .ico{font-size:22px}

/* ── SIGNATURE ── */
#sig-canvas{width:100%;height:130px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);touch-action:none;cursor:crosshair}

/* ── HISTORY ── */
.hist-filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.hist-search{flex:1;min-width:180px}
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer;transition:all .2s;active:opacity:.8}
.hist-card:hover{border-color:var(--border2);background:var(--surface2)}
.hist-card-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.hist-folio{font-size:13px;font-weight:700;color:var(--yellow)}
.hist-mode{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:600}
.hist-date{font-size:11px;color:var(--text3);margin-left:auto}
.hist-info{font-size:13px;color:var(--text2)}
.hist-info strong{color:var(--text)}
.hist-stats{display:flex;gap:10px;margin-top:8px;font-size:11px}
.hist-stat{display:flex;align-items:center;gap:4px;color:var(--text3)}
.hist-empty{text-align:center;padding:60px 20px;color:var(--text3)}
.hist-empty .ico{font-size:48px;margin-bottom:12px}

/* ── DETAIL OVERLAY ── */
#detail-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;overflow-y:auto}
#detail-overlay.open{display:flex}
.detail-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.detail-body{padding:16px;max-width:700px;margin:0 auto;width:100%}
.detail-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.detail-section-title{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.detail-row{display:flex;margin-bottom:8px;gap:10px}
.detail-key{font-size:12px;color:var(--text3);min-width:130px;flex-shrink:0;padding-top:1px}
.detail-val{font-size:13px;color:var(--text);flex:1;word-break:break-word}
.detail-chk-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.detail-chk-row:last-child{border-bottom:none}
.detail-chk-ico{font-size:14px;flex-shrink:0}
.detail-chk-text{font-size:13px;color:var(--text);flex:1}
.detail-chk-note{font-size:11px;color:var(--text3);margin-top:2px}
.detail-photos{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.detail-photos img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--radius-xs);border:1px solid var(--border)}
.detail-sig img{max-width:200px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface3);border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:24px;font-size:13px;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--surface);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.modal-close{margin-left:auto;background:var(--surface2);border:1px solid var(--border);border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:14px}

/* ── QR ── */
#qr-container{display:none;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-top:8px;position:relative}
#qr-video{width:100%;display:block}
#qr-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
#qr-frame{width:180px;height:180px;border:3px solid var(--blue);border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,.5)}
#qr-canvas{display:none}

/* ── COUNTER INPUT ── */
.counter-input{display:flex;align-items:center;gap:8px}
.counter-input input{flex:1;text-align:center;font-size:18px;font-weight:700;color:var(--text)}
.counter-btn{width:36px;height:36px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-xs);font-size:20px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.counter-btn:hover{background:var(--blue);border-color:var(--blue);color:#fff}

/* ── LEVEL BAR ── */
.level-bar-wrap{margin-top:6px}
.level-bar-track{height:8px;background:var(--surface3);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.level-bar-fill{height:100%;border-radius:4px;transition:width .3s}
.level-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:3px}
.level-selector{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:6px}
.level-btn{padding:6px 2px;text-align:center;font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:var(--radius-xs);cursor:pointer;background:var(--surface2);color:var(--text3);transition:all .15s}
.level-btn.sel{color:#fff}

/* ── TRICOLOR ── */
.tricolor-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}
.tricolor-card{background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s}
.tricolor-card .color-dot{width:24px;height:24px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center}
.tricolor-card .color-name{font-size:11px;font-weight:700;color:var(--text2)}
.tricolor-card .color-status{font-size:10px;color:var(--text3);margin-top:2px}

/* ── RESPONSIVE ── */
@media(min-width:600px){
  .field-row-3{grid-template-columns:1fr 1fr 1fr}
  .photo-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════ LOGIN ═══ -->
<div id="screen-login" class="screen active">
  <div class="login-logo">
    <div class="brand">THP Group International</div>
    <div class="title">M'WASH<span>3</span> PRO</div>
    <div class="sub">Sistema de Visitas Técnicas</div>
  </div>
  <div class="login-card">
    <label>Técnico</label>
    <select id="login-tecnico">
      <option value="">— Seleccionar —</option>
      <option>Gustavo Rodríguez</option>
      <option>Manuel Fernández</option>
      <option>Edgardo González</option>
      <option>Abel Cáceres</option>
      <option>Bélgica Vergara</option>
    </select>
    <label>Tipo de visita</label>
    <div class="mode-grid">
      <div class="mode-btn" onclick="selectMode('puesta')" id="mode-puesta">
        <span class="mode-ico">🔵</span><span class="mode-lbl">PUESTA EN MARCHA</span>
      </div>
      <div class="mode-btn" onclick="selectMode('preventivo')" id="mode-preventivo">
        <span class="mode-ico">🟡</span><span class="mode-lbl">PREVENTIVO</span>
      </div>
      <div class="mode-btn" onclick="selectMode('correctivo')" id="mode-correctivo">
        <span class="mode-ico">🔴</span><span class="mode-lbl">CORRECTIVO</span>
      </div>
    </div>
    <button class="btn-enter" id="btn-enter" onclick="doLogin()">Entrar →</button>
    <div class="version-tag"><strong>v27</strong> · M'WASH3 PRO · THP Group</div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ MAIN APP ═══ -->
<div id="screen-main" class="screen">
  <div class="app-header">
    <div class="back-btn" onclick="goLogin()">←</div>
    <div class="header-info">
      <div class="header-title" id="h-title">M'WASH3 PRO</div>
      <div class="header-sub" id="h-sub"></div>
    </div>
    <span class="header-badge" id="h-badge"></span>
  </div>
  <div class="tab-bar" id="tab-bar"></div>
  <div style="flex:1;overflow:hidden;display:flex;flex-direction:column">
    <div id="tabs-content" style="flex:1;overflow-y:auto"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ HISTORY SCREEN ═══ -->
<div id="screen-history" class="screen">
  <div class="app-header">
    <div class="back-btn" onclick="goLogin()">←</div>
    <div class="header-info">
      <div class="header-title">Historial de Visitas</div>
      <div class="header-sub" id="hist-sub">Cargando…</div>
    </div>
    <div class="header-badge badge-green" onclick="loadHistory()" style="cursor:pointer">🔄</div>
  </div>
  <div style="padding:16px;flex:1;overflow-y:auto">
    <div class="hist-filters">
      <input class="hist-search" id="hist-search" type="search" placeholder="Buscar cliente, técnico, serie…" oninput="filterHistory()">
      <select id="hist-mode-filter" onchange="filterHistory()" style="width:auto;min-width:130px">
        <option value="">Todos los modos</option>
        <option value="puesta">Puesta en Marcha</option>
        <option value="preventivo">Preventivo</option>
        <option value="correctivo">Correctivo</option>
      </select>
    </div>
    <div id="hist-list"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ DETAIL OVERLAY ═══ -->
<div id="detail-overlay">
  <div class="detail-header">
    <div class="back-btn" onclick="closeDetail()">←</div>
    <div class="header-info">
      <div class="header-title" id="detail-title">Detalle visita</div>
      <div class="header-sub" id="detail-sub"></div>
    </div>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- ═══════════════════════════════════════════ QR MODAL ═══ -->
<div class="modal-overlay" id="qr-modal">
  <div class="modal-sheet">
    <div class="modal-title">📷 Leer QR Equipo <div class="modal-close" onclick="closeQR()">✕</div></div>
    <div id="qr-container">
      <video id="qr-video" playsinline autoplay muted></video>
      <div id="qr-overlay"><div id="qr-frame"></div></div>
    </div>
    <canvas id="qr-canvas"></canvas>
    <div id="qr-result" style="margin-top:10px;font-size:13px;color:var(--text3);text-align:center"></div>
    <div style="margin-top:12px">
      <button class="btn btn-full" onclick="openQR()">📷 Iniciar cámara</button>
    </div>
  </div>

function switchTab(id){

function buildHoraOptions(){
  let opts='';
  for(let h=7;h<=22;h++){
    ['00','30'].forEach(m=>{
      const label=`${String(h).padStart(2,'0')}:${m}`;
      opts+=`<option value="${label}">${label}</option>`;
    });
  }
  return opts;
}

function calcHoras(){
  const ll=document.getElementById('f-hora-llegada').value;
  const sa=document.getElementById('f-hora-salida').value;
  if(!ll||!sa){document.getElementById('horas-total').textContent='';return;}
  const toMin=s=>{const[h,m]=s.split(':').map(Number);return h*60+m;};
  const diff=toMin(sa)-toMin(ll);
  if(diff<=0){document.getElementById('horas-total').textContent='⚠️ Hora salida debe ser mayor';return;}
  const hh=Math.floor(diff/60),mm=diff%60;
  document.getElementById('horas-total').textContent=`⏱ Total: ${hh}h ${mm}min`;
}

let sigCanvas, sigCtx, sigDrawing=false, sigLast={x:0,y:0};

function initSigCanvas(){
  setTimeout(()=>{
    sigCanvas=document.getElementById('sig-canvas');
    if(!sigCanvas)return;
    sigCtx=sigCanvas.getContext('2d');
    const setSize=()=>{
      const w=sigCanvas.offsetWidth;
      sigCanvas.width=w;sigCanvas.height=130;
      sigCtx.strokeStyle='#3b82f6';sigCtx.lineWidth=2.5;sigCtx.lineCap='round';sigCtx.lineJoin='round';
    };
    setSize();
    const getPos=(e,canvas)=>{
      const r=canvas.getBoundingClientRect();
      const src=e.touches?e.touches[0]:e;
      return{x:(src.clientX-r.left)*(canvas.width/r.width),y:(src.clientY-r.top)*(canvas.height/r.height)};
    };
    sigCanvas.addEventListener('mousedown',e=>{sigDrawing=true;sigLast=getPos(e,sigCanvas)});
    sigCanvas.addEventListener('mousemove',e=>{
      if(!sigDrawing)return;
      const p=getPos(e,sigCanvas);
      sigCtx.beginPath();sigCtx.moveTo(sigLast.x,sigLast.y);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();
      sigLast=p;
    });
    sigCanvas.addEventListener('mouseup',()=>{sigDrawing=false;state.sigData=sigCanvas.toDataURL()});
    sigCanvas.addEventListener('touchstart',e=>{e.preventDefault();sigDrawing=true;sigLast=getPos(e,sigCanvas)},{passive:false});
    sigCanvas.addEventListener('touchmove',e=>{
      e.preventDefault();
      if(!sigDrawing)return;
      const p=getPos(e,sigCanvas);
      sigCtx.beginPath();sigCtx.moveTo(sigLast.x,sigLast.y);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();
      sigLast=p;
    },{passive:false});
    sigCanvas.addEventListener('touchend',()=>{sigDrawing=false;state.sigData=sigCanvas.toDataURL()});
  },200);
}

function clearSig(){
  if(sigCanvas&&sigCtx){sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);state.sigData='';}
}

let allVisitas=[];

async function loadHistory(){
  const sub=document.getElementById('hist-sub');
  const list=document.getElementById('hist-list');
  if(!list)return;
  if(sub) sub.textContent='Cargando…';
  list.innerHTML=`<div class="hist-empty"><div class="ico">⏳</div><p>Cargando visitas…</p></div>`;
  try{
    const res=await fetch(GAS_URL+'?action=getAll&sheet=Visitas+MWASH3');
    const data=await res.json();
    if(data.rows && Array.isArray(data.rows)){
      allVisitas=data.rows;
    } else if(Array.isArray(data)){
      allVisitas=data;
    } else {
      allVisitas=[];
    }
    if(sub) sub.textContent=`${allVisitas.length} visitas`;
    filterHistory();
  } catch(err){
    list.innerHTML=`<div class="hist-empty"><div class="ico">⚠️</div><p>Error al cargar historial</p><p style="font-size:11px;margin-top:6px">${err.message}</p></div>`;
    if(sub) sub.textContent='Error de conexión';
  }
}

function filterHistory(){
  const q=(document.getElementById('hist-search')||{}).value||'';
  const mf=(document.getElementById('hist-mode-filter')||{}).value||'';
  const list=document.getElementById('hist-list');
  if(!list)return;
  let filtered=allVisitas.filter(v=>{
    const text=JSON.stringify(v).toLowerCase();
    const matchQ=!q||text.includes(q.toLowerCase());
    const matchM=!mf||(v.modo||v.Modo||'').toLowerCase().includes(mf.toLowerCase());
    return matchQ&&matchM;
  });
  if(!filtered.length){
    list.innerHTML=`<div class="hist-empty"><div class="ico">🔍</div><p>Sin resultados</p></div>`;
    return;
  }
  list.innerHTML=filtered.map((v,i)=>buildHistCard(v,i)).join('');
}

async function openQR(){
  const container=document.getElementById('qr-container');
  const video=document.getElementById('qr-video');
  const canvas=document.getElementById('qr-canvas');
  const result=document.getElementById('qr-result');
  container.style.display='block';
  result.textContent='Apunta al código QR del equipo…';
  try{
    qrStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    video.srcObject=qrStream;
    video.play();
    const scan=()=>{
      if(video.readyState===video.HAVE_ENOUGH_DATA){
        canvas.width=video.videoWidth;canvas.height=video.videoHeight;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        const img=ctx.getImageData(0,0,canvas.width,canvas.height);
        const code=jsQR(img.data,img.width,img.height);
        if(code){
          parseQR(code.data);
          stopQR();
          closeQR();
          return;
        }
      }
      qrFrame=requestAnimationFrame(scan);
    };
    qrFrame=requestAnimationFrame(scan);
  } catch(e){
    result.textContent='Error al acceder a la cámara: '+e.message;
  }
}

function parseQR(text){
  let nserie='',modelo='',anio='';
  if(text.includes(':')){
    text.split(/[;|]/).forEach(part=>{
      const[k,v]=part.split(':');
      if(!v)return;
      const ku=k.trim().toUpperCase();
      if(['SN','SERIE','SERIAL'].includes(ku))nserie=v.trim();
      else if(['MODEL','MODELO'].includes(ku))modelo=v.trim();
      else if(['YEAR','AÑO','ANO','YEAR'].includes(ku))anio=v.trim();
    });
  }
  if(!nserie)nserie=text.trim();
  if(nserie){const el=document.getElementById('f-nserie');if(el){el.value=nserie;state.nserie=nserie;}}
  if(modelo){const el=document.getElementById('f-modelo');if(el){el.value=modelo;state.modelo=modelo;}}
  if(anio){const el=document.getElementById('f-anio');if(el){el.value=anio;state.anio=anio;}}
  showToast('✅ QR leído: '+nserie);
}

// ════════════════════════════════
// SAVE
// ════════════════════════════════
function collectData(){
  // Collect checklist results
  let buenos=0,malos=0,itemsBuenos=[],itemsMalos=[];
  Object.entries(state.checklist).forEach(([key,v])=>{
    const label=key.split('::')[0].split('— ')[1]||key;
    if(v.val==='ok'){buenos++;itemsBuenos.push(label+(v.note?': '+v.note:''));}
    else if(v.val==='bad'){malos++;itemsMalos.push(label+(v.note?': '+v.note:''));}
  });

  // Collect correctivo
  let corrItems=[];
  Object.entries(state.correctivo).forEach(([key,v])=>{
    if(key==='falla'||key==='trabajos'||key==='repuestos')return;
    if(v.val){
      corrItems.push(`[${v.val==='ok'?'✓':v.val==='bad'?'✗':'—'}] ${key}${v.note?': '+v.note:''}`);
    }
  });

  return {
    folio:state.folio, fecha:state.fecha, tecnico:state.tecnico, modo:state.modo,
    nserie:state.nserie, modelo:state.modelo, anio:state.anio,
    lavadosTotales:state.lavadosTotales, lavadosPrueba:state.lavadosPrueba,
    cliente:state.cliente, poblacion:state.poblacion, ordenCliente:state.ordenCliente,
    horaLlegada:state.horaLlegada, horaSalida:state.horaSalida,
    buenos, malos,
    itemsBuenos:itemsBuenos.join('|'), itemsMalos:itemsMalos.join('|'),
    falla:state.correctivo.falla||'', trabajos:state.correctivo.trabajos||'', repuestos:state.correctivo.repuestos||'',
    corrItems:corrItems.join('|'),
    quimicos:JSON.stringify(state.quimicos),
    fotosProblema:state.photos.problema.join('||'),
    fotosAntes:state.photos.antes.join('||'),
    fotosDespues:state.photos.despues.join('||'),
    fotosMaquina:state.photos.maquina.join('||'),
    fotosQuimicos:state.photos.quimicos.join('||'),
    observaciones:state.observaciones, notas:state.notas, recomendaciones:state.recomendaciones,
    firmadoPor:state.firmadoPor, firma:state.sigData,
  };
}

async function guardarVisita(){
  if(!state.cliente){showToast('⚠️ Ingresa el nombre del cliente');return;}
  showToast('💾 Guardando visita…');
  const data=collectData();
  try{
    await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'save',sheet:'Visitas MWASH3',data})});
    showToast('✅ Visita guardada correctamente');
  } catch(e){
    showToast('⚠️ Error al guardar: '+e.message);
  }
}

async function guardarBorrador(){
  showToast('📝 Borrador guardado localmente');
  const data=collectData();
  localStorage.setItem('mwash3_borrador_'+Date.now(),JSON.stringify(data));
}

// ════════════════════════════════
// TOAST
// ════════════════════════════════
let toastT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),3000);
}
